name: Move commit to new branch and revert from main

on:
  push:
    branches:
      - copilot/remove-commit-from-main-branch
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to move to a new branch'
        required: true
        default: '321c56af2a46c177481d8ea3c882b0fcf6683217'
      new_branch_name:
        description: 'Name of the new branch to create for this commit'
        required: true
        default: 'feat/granularity-fix-plan'

env:
  # Defaults used when triggered by push (no inputs available)
  DEFAULT_COMMIT_SHA: '321c56af2a46c177481d8ea3c882b0fcf6683217'
  DEFAULT_NEW_BRANCH: 'feat/granularity-fix-plan'

jobs:
  move-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve inputs
        id: resolve
        run: |
          COMMIT_SHA="${{ github.event.inputs.commit_sha || env.DEFAULT_COMMIT_SHA }}"
          NEW_BRANCH="${{ github.event.inputs.new_branch_name || env.DEFAULT_NEW_BRANCH }}"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "new_branch=${NEW_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Using commit: ${COMMIT_SHA}"
          echo "Target branch: ${NEW_BRANCH}"

      - name: Validate commit exists
        run: |
          COMMIT_SHA="${{ steps.resolve.outputs.commit_sha }}"
          if ! git cat-file -e "${COMMIT_SHA}^{commit}" 2>/dev/null; then
            echo "Error: Commit ${COMMIT_SHA} not found in history"
            exit 1
          fi
          echo "Commit ${COMMIT_SHA} found: $(git log -1 --oneline ${COMMIT_SHA})"

      - name: Create new branch from commit
        run: |
          COMMIT_SHA="${{ steps.resolve.outputs.commit_sha }}"
          NEW_BRANCH="${{ steps.resolve.outputs.new_branch }}"
          if git ls-remote --exit-code --heads origin "${NEW_BRANCH}" >/dev/null 2>&1; then
            EXISTING_SHA=$(git ls-remote origin "refs/heads/${NEW_BRANCH}" | awk '{print $1}')
            if [ "${EXISTING_SHA}" = "${COMMIT_SHA}" ]; then
              echo "Branch '${NEW_BRANCH}' already exists at correct commit — skipping creation"
            else
              echo "Warning: branch '${NEW_BRANCH}' exists but points to ${EXISTING_SHA}, not ${COMMIT_SHA}"
            fi
          else
            git checkout -b "${NEW_BRANCH}" "${COMMIT_SHA}"
            git push origin "${NEW_BRANCH}"
            echo "Created branch '${NEW_BRANCH}' at ${COMMIT_SHA}"
          fi

      - name: Determine parent commit (main reset target)
        id: parent
        run: |
          COMMIT_SHA="${{ steps.resolve.outputs.commit_sha }}"
          PARENT_SHA=$(git rev-parse "${COMMIT_SHA}^")
          echo "parent_sha=${PARENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Parent commit: $(git log -1 --oneline ${PARENT_SHA})"

      - name: Reset main to parent commit
        run: |
          COMMIT_SHA="${{ steps.resolve.outputs.commit_sha }}"
          PARENT_SHA="${{ steps.parent.outputs.parent_sha }}"
          git fetch origin main:main
          MAIN_SHA=$(git rev-parse main)
          if [ "${MAIN_SHA}" = "${COMMIT_SHA}" ]; then
            git checkout main
            git reset --hard "${PARENT_SHA}"
            git push origin main --force
            echo "main has been reset from ${COMMIT_SHA} to ${PARENT_SHA}"
          elif [ "${MAIN_SHA}" = "${PARENT_SHA}" ]; then
            echo "main is already at ${PARENT_SHA} — no reset needed"
          else
            echo "Warning: main is at ${MAIN_SHA}, which is neither ${COMMIT_SHA} nor ${PARENT_SHA}"
            echo "Skipping reset to avoid unintentional data loss — please verify manually"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## Done" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch \`${{ steps.resolve.outputs.new_branch }}\` points to commit \`${{ steps.resolve.outputs.commit_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`main\` reset to commit \`${{ steps.parent.outputs.parent_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
